syntax = "proto3";

package com.alol.overlay;

option java_package = "com.alol.overlay.proto";
option java_multiple_files = true;

// خدمة ESP فائقة السرعة
service EspService {
    // تدفق ثنائي الاتجاه: اللعبة ترسل بيانات اللاعبين، ونحن نرد بالأوامر (مثل التصويب)
    rpc StreamEspData (stream EspRequest) returns (stream EspResponse) {}
}

// طلب من اللعبة إلى التطبيق
message EspRequest {
    int64 timestamp = 1;
    repeated Player players = 2;
    Camera camera = 3;
}

// رد من التطبيق إلى اللعبة (اختياري - للتحكم)
message EspResponse {
    bool draw_esp = 1;
    repeated Target targets = 2;
}

// بيانات اللاعب
message Player {
    float x = 1;
    float y = 2;
    float z = 3;
    float screen_x = 4;
    float screen_y = 5;
    float health = 6;
    float distance = 7;
    bool is_bot = 8;
    string name = 9;
    int32 team_id = 10;
}

// بيانات الكاميرا
message Camera {
    float loc_x = 1;
    float loc_y = 2;
    float loc_z = 3;
    float rot_pitch = 4;
    float rot_yaw = 5;
    float rot_roll = 6;
    float fov = 7;
}

// هدف للتصويب
message Target {
    float screen_x = 1;
    float screen_y = 2;
    float world_x = 3;
    float world_y = 4;
    float world_z = 5;
    bool head_target = 6;
}
